<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de JavaScript</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <div class="exercicio">
        <h2>Contador Limitado</h2>
        <button id="btn-decrementar">Decrementar</button>
        <button id="btn-incrementar">Incrementar</button>
        <p>Valor atual: <strong id="contador-valor">0</strong></p>
        <p id="msg-alerta"></p>
    </div>

    <div class="exercicio">
        <h2>Conversor de Temperatura (Celsius para Fahrenheit)</h2>
        <label for="temp-input">Digite em °C: </label>
        <input type="number" id="temp-input" placeholder="Ex: 25">
        <p>Resultado: <strong id="temp-resultado">-</strong></p>
    </div>

    <div class="exercicio">
        <h2>Lista de Tarefas</h2>
        <input type="text" id="tarefa-input" placeholder="Nova tarefa...">
        <button id="btn-adicionar">Adicionar</button>
        <ul id="lista-tarefas"></ul>
    </div>

</div>
    <script src="./script.js"></script>

</body>
</html>
